
<!DOCTYPE html>
<html>
<head>
    <title>My Cart - SwapKart</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f5f7f6;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#1f8f5f;
            margin-bottom:40px;
        }

        .cart-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }

        .cart-card{
            width:320px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .cart-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:20px;
        }

        .content h2{
            color:#1f8f5f;
            margin-bottom:10px;
        }

        .price{
            font-size:20px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .buttons{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        .btn{
            flex:1;
            text-align:center;
            padding:12px;
            border-radius:10px;
            text-decoration:none;
            color:white;
        }

        .buy-btn{
            background:#ff9800;
        }

        .remove-btn{
            background:red;
        }

.navbar{
    background:linear-gradient(
        90deg,
        #1f8f5f,
        #111
    );
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:0 3px 15px rgba(0,0,0,0.2);
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a{
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    white-space:nowrap;
    transition:0.3s;
}

.nav-links a:hover{
    background:white;
    color:#1f8f5f;
    transform:translateY(-2px);
}

    </style>

</head>

<body>
    <div class="navbar">

    <div class="logo">
        ♻️ SwapKart
    </div>

    <div class="nav-links">

        <a href="/home/">🏠 Home</a>

        <a href="/products/">🛍 Products</a>

        <a href="/add-product/">➕ Add Product</a>

        <a href="/my-orders/">📦 Orders</a>

        <a href="/my-uploads/">📤 Uploads</a>

        <a href="/exchange-requests/">📩 Exchanges</a>

        <a href="/logout/">🚪 Logout</a>

    </div>

</div>

    <h1>🛒 My Cart</h1>

    <div class="cart-container">

        {% for item in cart_items %}

        <div class="cart-card">

            {% if product.image %}
    <img src="{{ product.image.url }}">
{% else %}
    <img src="https://via.placeholder.com/300x300?text=No+Image">
{% endif %}

            <div class="content">

                <h2>
                    {{ item.product.title }}
                </h2>

                <p class="price">
                    ₹{{ item.product.price }}
                </p>

                <div class="buttons">

                    <a href="/buy-now/{{ item.product.id }}/"
                       class="btn buy-btn">

                        ⚡ Buy Now

                    </a>

                    <a href="/remove-from-cart/{{ item.id }}/"
                       class="btn remove-btn">

                        🗑 Remove

                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <h2 style="color:gray;">
            Your cart is empty.
        </h2>

        {% endfor %}

    </div>

</body>
</html>
