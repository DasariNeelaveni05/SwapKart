<!DOCTYPE html>
<html>
<head>
    <title>Login - SwapKart</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f8f9fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            width:350px;
            padding:40px;
            border-radius:18px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#1f8f5f;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            background:#1f8f5f;
            border:none;
            color:white;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:18px;
            color:#666;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h1>Welcome Back</h1>

        <form method="POST">

    {% csrf_token %}

    <input type="text" name="username" placeholder="Enter Username">

    <input type="password" name="password" placeholder="Enter Password">

    <button type="submit">
        Login
    </button>

</form>
{% if error %}
    <p style="color:red; text-align:center;">
        {{ error }}
    </p>
{% endif %}

        <p>
            Smart exchange starts here.
        </p>

    </div>

</body>
</html>
